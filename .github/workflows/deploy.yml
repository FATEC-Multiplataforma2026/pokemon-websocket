name: Build & Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR
        run: mvn package -q

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/pokemon-websocket-1.0.jar
          target: /home/${{ secrets.EC2_USER }}/pokemon-websocket/
          strip_components: 1

      - name: Copy service file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: pokemon-websocket.service
          target: /home/${{ secrets.EC2_USER }}/

      - name: Install service and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Garante que Java está instalado
            if ! command -v java &> /dev/null; then
              sudo yum install -y java-17-amazon-corretto-headless 2>/dev/null || \
              sudo apt-get install -y openjdk-17-jre-headless 2>/dev/null
            fi

            # Instala o service file substituindo o USER real
            sudo sed "s/ec2-user/$USER/g" \
              /home/$USER/pokemon-websocket.service \
              > /tmp/pokemon-websocket.service
            sudo mv /tmp/pokemon-websocket.service /etc/systemd/system/pokemon-websocket.service

            sudo systemctl daemon-reload
            sudo systemctl enable pokemon-websocket

            # Para gracioso se já estiver rodando, depois sobe
            sudo systemctl restart pokemon-websocket

            sleep 3
            sudo systemctl status pokemon-websocket --no-pager
